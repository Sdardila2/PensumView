<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de Pensum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --header-bg: #003865;
      --border: #dde1e8;
      --text: #1a1d23;
      --muted: #6b7280;
      --sem-header: #e8ecf2;

      --cat-matematicas-bg: #dbeafe;
      --cat-matematicas-border: #3b82f6;
      --cat-matematicas-text: #1e3a8a;
      --cat-ciencias-bg: #dcfce7;
      --cat-ciencias-border: #22c55e;
      --cat-ciencias-text: #14532d;
      --cat-programacion-bg: #ede9fe;
      --cat-programacion-border: #8b5cf6;
      --cat-programacion-text: #3b0764;
      --cat-sistemas-bg: #ccfbf1;
      --cat-sistemas-border: #14b8a6;
      --cat-sistemas-text: #134e4a;
      --cat-electiva-bg: #fef9c3;
      --cat-electiva-border: #eab308;
      --cat-electiva-text: #713f12;
      --cat-humanidades-bg: #fce7f3;
      --cat-humanidades-border: #ec4899;
      --cat-humanidades-text: #831843;
      --cat-idiomas-bg: #f1f5f9;
      --cat-idiomas-border: #94a3b8;
      --cat-idiomas-text: #334155;
      --cat-grado-bg: #fff1f2;
      --cat-grado-border: #f43f5e;
      --cat-grado-text: #881337;

      --estado-aprobada-bg: #166534;
      --estado-aprobada-text: #bbf7d0;
      --estado-aprobada-border: #15803d;
      --estado-reprobada-bg: #7f1d1d;
      --estado-reprobada-text: #fecaca;
      --estado-reprobada-border: #b91c1c;
      --estado-cursando-bg: #78350f;
      --estado-cursando-text: #fde68a;
      --estado-cursando-border: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    header {
      background: var(--header-bg);
      color: white;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .h-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .h-sub {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 1px;
    }

    .h-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    select#carrera-select {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      max-width: 260px;
    }

    select#carrera-select option {
      background: #003865;
      color: white;
    }

    .stats-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .spill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid;
      font-weight: 500;
    }

    .spill.ap {
      background: #dcfce7;
      border-color: #22c55e;
      color: #14532d;
    }

    .spill.rep {
      background: #fee2e2;
      border-color: #ef4444;
      color: #7f1d1d;
    }

    .spill.cur {
      background: #fef9c3;
      border-color: #eab308;
      color: #713f12;
    }

    .spill.tot {
      background: #f1f5f9;
      border-color: #94a3b8;
      color: #334155;
    }

    .legend-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }

    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 1.5px solid;
    }

    .view-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .view-btn {
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.65);
      border: none;
      background: transparent;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .view-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }

    .view-btn.active {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .view-btn .vb-icon {
      font-size: 13px;
    }

    .vista-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid;
      font-size: 11px;
      font-weight: 500;
    }

    .vista-badge.completa {
      background: #ede9fe;
      border-color: #8b5cf6;
      color: #3b0764;
    }

    .vista-badge.disponible {
      background: #dcfce7;
      border-color: #22c55e;
      color: #14532d;
    }

    .sem-col.vd-hidden {
      display: none;
    }

    .sem-col.vd-empty .sem-body {
      min-height: 20px;
    }

    .mat-card.vd-hidden {
      display: none;
    }

    .disponibles-count {
      font-size: 10px;
      color: #15803d;
      font-weight: 600;
      background: #dcfce7;
      border: 1px solid #22c55e;
      border-radius: 10px;
      padding: 1px 6px;
      margin-top: 3px;
      display: inline-block;
    }

    .canvas-wrapper {
      overflow-x: auto;
      padding: 20px;
      position: relative;
    }

    .pensum-canvas {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      gap: 0;
      min-width: max-content;
    }

    .row-sem {
      display: flex;
      flex-direction: row;
      gap: 0;
      align-items: stretch;
    }

    .sem-col {
      width: 148px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sem-col:last-child {
      border-right: none;
    }

    .sem-head {
      background: var(--sem-header);
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      text-align: center;
    }

    .sem-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--header-bg);
    }

    .sem-cred {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .sem-body {
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      background: var(--bg);
    }

    .row-idiomas {
      border-top: 2px dashed var(--border);
      margin-top: 8px;
      display: flex;
      flex-direction: row;
      gap: 0;
    }

    .idioma-slot {
      width: 148px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 6px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .idioma-slot:last-child {
      border-right: none;
    }

    .idioma-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      padding: 4px 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .mat-card {
      border-radius: 5px;
      padding: 6px 7px;
      cursor: pointer;
      border: 1.5px solid;
      transition: transform 0.1s, opacity 0.1s;
      position: relative;
      user-select: none;
    }

    .mat-card:hover {
      transform: scale(1.02);
      z-index: 10;
    }

    .mat-card.dim {
      opacity: 0.35;
    }

    .mat-card.highlight-req {
      outline: 2px solid #f59e0b;
      outline-offset: 1px;
    }

    .mat-card.highlight-dep {
      outline: 2px dashed #6366f1;
      outline-offset: 1px;
    }

    .mat-card.matematicas {
      background: var(--cat-matematicas-bg);
      border-color: var(--cat-matematicas-border);
    }

    .mat-card.ciencias {
      background: var(--cat-ciencias-bg);
      border-color: var(--cat-ciencias-border);
    }

    .mat-card.programacion {
      background: var(--cat-programacion-bg);
      border-color: var(--cat-programacion-border);
    }

    .mat-card.sistemas {
      background: var(--cat-sistemas-bg);
      border-color: var(--cat-sistemas-border);
    }

    .mat-card.electiva {
      background: var(--cat-electiva-bg);
      border-color: var(--cat-electiva-border);
    }

    .mat-card.humanidades {
      background: var(--cat-humanidades-bg);
      border-color: var(--cat-humanidades-border);
    }

    .mat-card.idiomas {
      background: var(--cat-idiomas-bg);
      border-color: var(--cat-idiomas-border);
    }

    .mat-card.grado {
      background: var(--cat-grado-bg);
      border-color: var(--cat-grado-border);
    }

    .mat-card.estado-aprobada {
      background: var(--estado-aprobada-bg) !important;
      border-color: var(--estado-aprobada-border) !important;
    }

    .mat-card.estado-reprobada {
      background: var(--estado-reprobada-bg) !important;
      border-color: var(--estado-reprobada-border) !important;
    }

    .mat-card.estado-cursando {
      background: var(--estado-cursando-bg) !important;
      border-color: var(--estado-cursando-border) !important;
    }

    .mat-codigo {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3px;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .mat-card.matematicas .mat-codigo {
      color: var(--cat-matematicas-text);
    }

    .mat-card.ciencias .mat-codigo {
      color: var(--cat-ciencias-text);
    }

    .mat-card.programacion .mat-codigo {
      color: var(--cat-programacion-text);
    }

    .mat-card.sistemas .mat-codigo {
      color: var(--cat-sistemas-text);
    }

    .mat-card.electiva .mat-codigo {
      color: var(--cat-electiva-text);
    }

    .mat-card.humanidades .mat-codigo {
      color: var(--cat-humanidades-text);
    }

    .mat-card.idiomas .mat-codigo {
      color: var(--cat-idiomas-text);
    }

    .mat-card.grado .mat-codigo {
      color: var(--cat-grado-text);
    }

    .mat-card.estado-aprobada .mat-codigo {
      color: var(--estado-aprobada-text);
    }

    .mat-card.estado-reprobada .mat-codigo {
      color: var(--estado-reprobada-text);
    }

    .mat-card.estado-cursando .mat-codigo {
      color: var(--estado-cursando-text);
    }

    .mat-nombre {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.3;
    }

    .mat-card.matematicas .mat-nombre {
      color: var(--cat-matematicas-text);
    }

    .mat-card.ciencias .mat-nombre {
      color: var(--cat-ciencias-text);
    }

    .mat-card.programacion .mat-nombre {
      color: var(--cat-programacion-text);
    }

    .mat-card.sistemas .mat-nombre {
      color: var(--cat-sistemas-text);
    }

    .mat-card.electiva .mat-nombre {
      color: var(--cat-electiva-text);
    }

    .mat-card.humanidades .mat-nombre {
      color: var(--cat-humanidades-text);
    }

    .mat-card.idiomas .mat-nombre {
      color: var(--cat-idiomas-text);
    }

    .mat-card.grado .mat-nombre {
      color: var(--cat-grado-text);
    }

    .mat-card.estado-aprobada .mat-nombre {
      color: var(--estado-aprobada-text);
    }

    .mat-card.estado-reprobada .mat-nombre {
      color: var(--estado-reprobada-text);
    }

    .mat-card.estado-cursando .mat-nombre {
      color: var(--estado-cursando-text);
    }

    .mat-cred {
      font-size: 9px;
      margin-top: 3px;
      opacity: 0.65;
    }

    .mat-card.matematicas .mat-cred {
      color: var(--cat-matematicas-text);
    }

    .mat-card.ciencias .mat-cred {
      color: var(--cat-ciencias-text);
    }

    .mat-card.programacion .mat-cred {
      color: var(--cat-programacion-text);
    }

    .mat-card.sistemas .mat-cred {
      color: var(--cat-sistemas-text);
    }

    .mat-card.electiva .mat-cred {
      color: var(--cat-electiva-text);
    }

    .mat-card.humanidades .mat-cred {
      color: var(--cat-humanidades-text);
    }

    .mat-card.idiomas .mat-cred {
      color: var(--cat-idiomas-text);
    }

    .mat-card.grado .mat-cred {
      color: var(--cat-grado-text);
    }

    .mat-card.estado-aprobada .mat-cred {
      color: var(--estado-aprobada-text);
    }

    .mat-card.estado-reprobada .mat-cred {
      color: var(--estado-reprobada-text);
    }

    .mat-card.estado-cursando .mat-cred {
      color: var(--estado-cursando-text);
    }

    .mat-bloqueada-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 9px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 3px;
      padding: 1px 3px;
      opacity: 0.7;
    }

    svg.arrows {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .ctx-menu {
      position: fixed;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px;
      min-width: 170px;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .ctx-item {
      padding: 7px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .ctx-item:hover {
      background: var(--bg);
    }

    .ctx-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .ctx-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .ctx-lbl {
      padding: 3px 12px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .detail-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 280px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      display: none;
    }

    .detail-panel.open {
      display: block;
    }

    .dp-close {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
    }

    .dp-codigo {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .dp-nombre {
      font-size: 14px;
      font-weight: 600;
      margin: 4px 0 10px;
      line-height: 1.3;
    }

    .dp-section {
      margin-bottom: 8px;
    }

    .dp-stitle {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .dp-row {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 4px;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dp-row.ok {
      background: #dcfce7;
      color: #14532d;
    }

    .dp-row.fail {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .dp-row.dep {
      background: #ede9fe;
      color: #3b0764;
    }

    .dp-row.co-ok {
      background: #fef9c3;
      color: #713f12;
    }

    .dp-row.co-fail {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .dp-empty {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>

<body>

  <header>
    <div>
      <div class="h-title" id="h-titulo">Visor de Pensum</div>
      <div class="h-sub" id="h-sub"></div>
    </div>
    <div class="h-right">
      <div class="view-toggle" id="view-toggle">
        <button class="view-btn active" data-view="completa" id="btn-completa">
          <span class="vb-icon">⊞</span> Malla completa
        </button>
        <button class="view-btn" data-view="disponible" id="btn-disponible">
          <span class="vb-icon">✦</span> Disponible para mí
        </button>
      </div>
      <select id="carrera-select"></select>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="legend-bar" id="legend-bar">
    <span style="font-size:11px;font-weight:600;color:var(--muted)">Categorías:</span>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-matematicas-bg);border-color:var(--cat-matematicas-border)">
      </div><span style="color:var(--cat-matematicas-text)">Matemáticas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-ciencias-bg);border-color:var(--cat-ciencias-border)"></div><span
        style="color:var(--cat-ciencias-text)">Ciencias</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-programacion-bg);border-color:var(--cat-programacion-border)">
      </div><span style="color:var(--cat-programacion-text)">Programación</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-sistemas-bg);border-color:var(--cat-sistemas-border)"></div><span
        style="color:var(--cat-sistemas-text)">Sistemas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-electiva-bg);border-color:var(--cat-electiva-border)"></div><span
        style="color:var(--cat-electiva-text)">Electiva</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-humanidades-bg);border-color:var(--cat-humanidades-border)">
      </div><span style="color:var(--cat-humanidades-text)">Humanidades</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-idiomas-bg);border-color:var(--cat-idiomas-border)"></div><span
        style="color:var(--cat-idiomas-text)">Idiomas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-grado-bg);border-color:var(--cat-grado-border)"></div><span
        style="color:var(--cat-grado-text)">Grado/Comp.</span>
    </div>
    <span style="margin-left:10px;font-size:11px;font-weight:600;color:var(--muted)">Estados:</span>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-aprobada-bg);border-color:var(--estado-aprobada-border)">
      </div><span
        style="color:var(--estado-aprobada-text);background:var(--estado-aprobada-bg);padding:1px 4px;border-radius:3px">Aprobada</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-reprobada-bg);border-color:var(--estado-reprobada-border)">
      </div><span
        style="color:var(--estado-reprobada-text);background:var(--estado-reprobada-bg);padding:1px 4px;border-radius:3px">Reprobada</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-cursando-bg);border-color:var(--estado-cursando-border)">
      </div><span
        style="color:var(--estado-cursando-text);background:var(--estado-cursando-bg);padding:1px 4px;border-radius:3px">Cursando</span>
    </div>
    <span style="margin-left:6px;font-size:10px;color:var(--muted)">| Click derecho para cambiar estado · Click para ver
      detalles</span>
  </div>

  <div class="canvas-wrapper">
    <div class="pensum-canvas" id="pensum-canvas">
      <svg class="arrows" id="arrows-svg"></svg>
    </div>
  </div>

  <div class="ctx-menu" id="ctx-menu" style="display:none">
    <div class="ctx-lbl">Cambiar estado</div>
    <div class="ctx-item" data-action="aprobada"><span class="ctx-dot"
        style="background:var(--estado-aprobada-bg);border:1.5px solid var(--estado-aprobada-border)"></span>Aprobada
    </div>
    <div class="ctx-item" data-action="reprobada"><span class="ctx-dot"
        style="background:var(--estado-reprobada-bg);border:1.5px solid var(--estado-reprobada-border)"></span>Reprobada
      / Vista</div>
    <div class="ctx-item" data-action="cursando"><span class="ctx-dot"
        style="background:var(--estado-cursando-bg);border:1.5px solid var(--estado-cursando-border)"></span>Cursando
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="reset"><span class="ctx-dot"
        style="background:#e5e7eb;border:1.5px solid #9ca3af"></span>Restablecer</div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <span class="dp-close" id="dp-close">✕</span>
    <div class="dp-codigo" id="dp-codigo"></div>
    <div class="dp-nombre" id="dp-nombre"></div>
    <div id="dp-body"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const ESTADO_KEY = 'pensum_v2_estados';
    const CARRERA_KEY = 'pensum_v2_carrera';
    const VISTA_KEY = 'pensum_v2_vista';
    let estados = {};
    let carreraActual = null;
    let materiasMap = {};
    let cardEls = {};
    let ctxTarget = null;
    let activeId = null;
    let vistaMode = 'completa';

    function loadState() {
      try { estados = JSON.parse(localStorage.getItem(ESTADO_KEY) || '{}'); } catch { estados = {}; }
    }
    function saveState() { localStorage.setItem(ESTADO_KEY, JSON.stringify(estados)); }
    function getEstado(id) { return estados[id] || null; }
    function setEstado(id, val) { if (val) estados[id] = val; else delete estados[id]; saveState(); }

    function calcVisible(id) {
      const e = getEstado(id);
      if (e) return e;
      const m = materiasMap[id];
      if (!m) return 'disponible';
      const prereqsOk = m.prerreqs.every(pid => getEstado(pid) === 'aprobada');
      const correqsOk = m.correqs.every(cid => { const ce = getEstado(cid); return ce === 'cursando' || ce === 'aprobada'; });
      return (prereqsOk && correqsOk) ? 'disponible' : 'bloqueada';
    }

    function buildMap(carrera) {
      materiasMap = {};
      carrera.semestres.forEach(s => s.materias.forEach(m => { materiasMap[m.id] = { ...m, _sem: s.numero }; }));
      if (carrera.idiomas) carrera.idiomas.forEach(m => { materiasMap[m.id] = { ...m, _sem: m.semestre_ref }; });
    }

    function makeCard(m) {
      const div = document.createElement('div');
      const estado = calcVisible(m.id);
      const estClass = estado !== 'disponible' && estado !== 'bloqueada' ? `estado-${estado}` : '';
      div.className = `mat-card ${m.categoria} ${estClass}`.trim();
      div.dataset.id = m.id;

      const bloq = (estado === 'bloqueada' && !getEstado(m.id)) ? `<span class="mat-bloqueada-badge">🔒</span>` : '';
      div.innerHTML = `${bloq}<div class="mat-codigo">${m.codigo}</div><div class="mat-nombre">${m.nombre}</div><div class="mat-cred">Cr. ${m.creditos} (${m.ht || 0}, ${m.hp || 0})</div>`;

      div.addEventListener('click', e => { e.stopPropagation(); activateCard(m.id); });
      div.addEventListener('contextmenu', e => { e.preventDefault(); ctxTarget = m.id; showCtx(e.clientX, e.clientY); });
      return div;
    }

    function render() {
      if (!carreraActual) return;
      const canvas = document.getElementById('pensum-canvas');
      canvas.innerHTML = '<svg class="arrows" id="arrows-svg"></svg>';
      cardEls = {};

      const rowSem = document.createElement('div');
      rowSem.className = 'row-sem';

      carreraActual.semestres.forEach(sem => {
        const col = document.createElement('div');
        col.className = 'sem-col';
        col.id = `semcol-${sem.numero}`;

        const visibles = vistaMode === 'disponible'
          ? sem.materias.filter(m => { const v = calcVisible(m.id); return v !== 'bloqueada'; })
          : sem.materias;

        const dispCount = sem.materias.filter(m => calcVisible(m.id) === 'disponible').length;
        const dispBadge = vistaMode === 'completa' && dispCount > 0
          ? `<div class="disponibles-count">${dispCount} disponible${dispCount > 1 ? 's' : ''}</div>` : '';

        col.innerHTML = `<div class="sem-head"><div class="sem-num">Semestre ${toRoman(sem.numero)}</div><div class="sem-cred">Cré. ${sem.creditos}</div>${dispBadge}</div><div class="sem-body" id="sb-${sem.numero}"></div>`;

        if (vistaMode === 'disponible' && visibles.length === 0) col.classList.add('vd-hidden');
        rowSem.appendChild(col);
      });
      canvas.insertBefore(rowSem, canvas.querySelector('svg'));

      carreraActual.semestres.forEach(sem => {
        const body = canvas.querySelector(`#sb-${sem.numero}`);
        if (!body) return;
        const list = vistaMode === 'disponible'
          ? sem.materias.filter(m => { const v = calcVisible(m.id); return v !== 'bloqueada'; })
          : sem.materias;
        list.forEach(m => {
          const card = makeCard(m);
          body.appendChild(card);
          cardEls[m.id] = card;
        });
      });

      if (carreraActual.idiomas && carreraActual.idiomas.length > 0) {
        const rowId = document.createElement('div');
        rowId.className = 'row-idiomas';
        const nSem = carreraActual.semestres.length;
        const byRef = {};
        carreraActual.idiomas.forEach(m => { if (!byRef[m.semestre_ref]) byRef[m.semestre_ref] = []; byRef[m.semestre_ref].push(m); });
        let anyVisible = false;
        for (let i = 1; i <= nSem; i++) {
          const slot = document.createElement('div');
          slot.className = 'idioma-slot';
          const list = byRef[i] || [];
          const visibles = vistaMode === 'disponible'
            ? list.filter(m => { const v = calcVisible(m.id); return v !== 'bloqueada'; })
            : list;
          visibles.forEach(m => {
            const card = makeCard(m);
            slot.appendChild(card);
            cardEls[m.id] = card;
            anyVisible = true;
          });
          rowId.appendChild(slot);
        }
        if (!(vistaMode === 'disponible' && !anyVisible)) {
          canvas.insertBefore(rowId, canvas.querySelector('svg'));
        }
      }

      renderStats();
      requestAnimationFrame(() => drawArrows());
    }

    function toRoman(n) {
      const r = ['', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];
      return r[n] || n;
    }

    function renderStats() {
      let ap = 0, rep = 0, cur = 0, disp = 0, total = 0, credAp = 0, credTot = 0;
      Object.values(materiasMap).forEach(m => {
        total++; credTot += m.creditos;
        const e = getEstado(m.id);
        const v = calcVisible(m.id);
        if (e === 'aprobada') { ap++; credAp += m.creditos; }
        if (e === 'reprobada') rep++;
        if (e === 'cursando') cur++;
        if (v === 'disponible') disp++;
      });
      const pct = credTot > 0 ? Math.round(credAp / credTot * 100) : 0;
      const modoBadge = vistaMode === 'disponible'
        ? `<div class="vista-badge disponible">✦ Vista: disponible para mí · ${disp} materias</div>`
        : `<div class="vista-badge completa">⊞ Vista: malla completa</div>`;
      document.getElementById('stats-bar').innerHTML = `
    ${modoBadge}
    <div class="spill ap">${ap} aprobadas · ${credAp} cr.</div>
    <div class="spill rep">${rep} reprobadas</div>
    <div class="spill cur">${cur} cursando</div>
    <div class="spill tot">${ap}/${total} materias · ${pct}%</div>`;
    }

    function drawArrows() {
      const svg = document.getElementById('arrows-svg');
      if (!svg) return;
      svg.innerHTML = '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#94a3b8"/></marker><marker id="arr-co" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#f59e0b"/></marker></defs>';

      const canvas = document.getElementById('pensum-canvas');
      const cr = canvas.getBoundingClientRect();
      const scrollX = canvas.parentElement.scrollLeft;

      function center(el) {
        const r = el.getBoundingClientRect();
        return { x: r.left - cr.left + scrollX + r.width / 2, y: r.top - cr.top + r.height / 2 };
      }

      Object.values(materiasMap).forEach(m => {
        const toEl = cardEls[m.id];
        if (!toEl) return;
        const to = center(toEl);

        m.prerreqs.forEach(pid => {
          const fromEl = cardEls[pid];
          if (!fromEl) return;
          const from = center(fromEl);
          const mx = (from.x + to.x) / 2;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M${from.x},${from.y} C${mx},${from.y} ${mx},${to.y} ${to.x},${to.y}`);
          path.setAttribute('stroke', '#94a3b8');
          path.setAttribute('stroke-width', '1.2');
          path.setAttribute('fill', 'none');
          path.setAttribute('opacity', '0.5');
          path.setAttribute('marker-end', 'url(#arr)');
          path.dataset.from = pid; path.dataset.to = m.id; path.dataset.type = 'pre';
          svg.appendChild(path);
        });

        m.correqs.forEach(cid => {
          const fromEl = cardEls[cid];
          if (!fromEl) return;
          const from = center(fromEl);
          const mx = (from.x + to.x) / 2;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M${from.x},${from.y} C${mx},${from.y} ${mx},${to.y} ${to.x},${to.y}`);
          path.setAttribute('stroke', '#f59e0b');
          path.setAttribute('stroke-width', '1.2');
          path.setAttribute('stroke-dasharray', '4,3');
          path.setAttribute('fill', 'none');
          path.setAttribute('opacity', '0.5');
          path.setAttribute('marker-end', 'url(#arr-co)');
          path.dataset.from = cid; path.dataset.to = m.id; path.dataset.type = 'co';
          svg.appendChild(path);
        });
      });
    }

    function activateCard(id) {
      activeId = id;
      const m = materiasMap[id];
      if (!m) return;

      Object.values(cardEls).forEach(el => el.classList.remove('dim', 'highlight-req', 'highlight-dep'));
      const relIds = new Set([id]);
      m.prerreqs.forEach(p => relIds.add(p));
      m.correqs.forEach(c => relIds.add(c));
      Object.values(materiasMap).forEach(om => { if (om.prerreqs.includes(id) || om.correqs.includes(id)) relIds.add(om.id); });

      Object.entries(cardEls).forEach(([eid, el]) => {
        if (!relIds.has(eid)) { el.classList.add('dim'); return; }
        if (eid === id) return;
        if (m.prerreqs.includes(eid) || m.correqs.includes(eid)) el.classList.add('highlight-req');
        else el.classList.add('highlight-dep');
      });

      const svg = document.getElementById('arrows-svg');
      if (svg) svg.querySelectorAll('path').forEach(p => {
        const isRel = p.dataset.from === id || p.dataset.to === id || relIds.has(p.dataset.from) && p.dataset.to === id || p.dataset.from === id;
        p.setAttribute('opacity', isRel ? '0.9' : '0.08');
        if (isRel) { p.setAttribute('stroke-width', '2'); }
      });

      showDetail(id);
    }

    function clearActive() {
      activeId = null;
      Object.values(cardEls).forEach(el => el.classList.remove('dim', 'highlight-req', 'highlight-dep'));
      const svg = document.getElementById('arrows-svg');
      if (svg) svg.querySelectorAll('path').forEach(p => { p.setAttribute('opacity', '0.5'); p.setAttribute('stroke-width', '1.2'); });
      document.getElementById('detail-panel').classList.remove('open');
    }

    function showDetail(id) {
      const m = materiasMap[id];
      if (!m) return;
      document.getElementById('dp-codigo').textContent = m.codigo;
      document.getElementById('dp-nombre').textContent = m.nombre;

      let html = `<div class="dp-section"><div class="dp-stitle">Créditos</div><div style="font-size:13px;font-weight:600">${m.creditos} &nbsp;<span style="font-size:10px;color:var(--muted)">(HT: ${m.ht || 0} · HP: ${m.hp || 0})</span></div></div>`;

      if (m.prerreqs.length > 0) {
        html += `<div class="dp-section"><div class="dp-stitle">Prerrequisitos</div>`;
        m.prerreqs.forEach(pid => {
          const pm = materiasMap[pid];
          const ok = getEstado(pid) === 'aprobada';
          html += `<div class="dp-row ${ok ? 'ok' : 'fail'}">${ok ? '✓' : '✗'} ${pm ? pm.nombre : pid} <span style="margin-left:auto;font-size:9px;opacity:0.7">${pm ? pm.codigo : ''}</span></div>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="dp-section"><div class="dp-stitle">Prerrequisitos</div><div class="dp-empty">Sin prerrequisitos</div></div>`;
      }

      if (m.correqs.length > 0) {
        html += `<div class="dp-section"><div class="dp-stitle">Correquisitos</div>`;
        m.correqs.forEach(cid => {
          const cm = materiasMap[cid];
          const ce = getEstado(cid);
          const ok = ce === 'cursando' || ce === 'aprobada';
          html += `<div class="dp-row ${ok ? 'co-ok' : 'co-fail'}">${ok ? '✓' : '✗'} ${cm ? cm.nombre : cid} <span style="margin-left:auto;font-size:9px;opacity:0.7">${cm ? cm.codigo : ''}</span></div>`;
        });
        html += `</div>`;
      }

      const deps = Object.values(materiasMap).filter(om => om.prerreqs.includes(id) || om.correqs.includes(id));
      if (deps.length > 0) {
        html += `<div class="dp-section"><div class="dp-stitle">Desbloquea</div>`;
        deps.forEach(dm => {
          html += `<div class="dp-row dep">→ ${dm.nombre} <span style="margin-left:auto;font-size:9px;opacity:0.7">${dm.codigo}</span></div>`;
        });
        html += `</div>`;
      }

      document.getElementById('dp-body').innerHTML = html;
      document.getElementById('detail-panel').classList.add('open');
    }

    function showCtx(x, y) {
      const menu = document.getElementById('ctx-menu');
      menu.style.display = 'block';
      const mw = 180, mh = 150;
      menu.style.left = (x + mw > window.innerWidth ? x - mw : x) + 'px';
      menu.style.top = (y + mh > window.innerHeight ? y - mh : y) + 'px';
    }

    document.getElementById('ctx-menu').addEventListener('click', e => {
      const item = e.target.closest('.ctx-item');
      if (!item || !ctxTarget) return;
      const action = item.dataset.action;
      setEstado(ctxTarget, action === 'reset' ? null : action);
      document.getElementById('ctx-menu').style.display = 'none';
      render();
      if (ctxTarget) activateCard(ctxTarget);
    });

    document.addEventListener('click', e => {
      document.getElementById('ctx-menu').style.display = 'none';
      if (!e.target.closest('.mat-card') && !e.target.closest('.detail-panel') && !e.target.closest('.ctx-menu')) clearActive();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { document.getElementById('ctx-menu').style.display = 'none'; clearActive(); }
    });

    document.getElementById('dp-close').addEventListener('click', clearActive);

    document.getElementById('view-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.view-btn');
      if (!btn) return;
      vistaMode = btn.dataset.view;
      localStorage.setItem(VISTA_KEY, vistaMode);
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === vistaMode));
      clearActive();
      render();
    });

    window.addEventListener('resize', () => { if (carreraActual) requestAnimationFrame(drawArrows); });

    function init() {
      loadState();
      vistaMode = localStorage.getItem(VISTA_KEY) || 'completa';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === vistaMode));
      const sel = document.getElementById('carrera-select');
      PENSUMS.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.nombre;
        sel.appendChild(opt);
      });
      const saved = localStorage.getItem(CARRERA_KEY) || PENSUMS[0]?.id;
      sel.value = saved || PENSUMS[0]?.id;
      setCarrera(sel.value);
      sel.addEventListener('change', () => { localStorage.setItem(CARRERA_KEY, sel.value); setCarrera(sel.value); });
    }

    function setCarrera(id) {
      carreraActual = PENSUMS.find(c => c.id === id);
      if (!carreraActual) return;
      buildMap(carreraActual);
      document.getElementById('h-titulo').textContent = carreraActual.nombre.split('—')[0].trim();
      document.getElementById('h-sub').textContent = (carreraActual.nombre.split('—')[1] || '').trim() + (carreraActual.creditos_totales ? ` · ${carreraActual.creditos_totales} créditos totales` : '');
      render();
    }

    init();
  </script>
</body>

</html>
