<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de Pensum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <div>
      <div class="h-title" id="h-titulo">Visor de Pensum</div>
      <div class="h-sub" id="h-sub"></div>
    </div>
    <div class="h-right">
      <div class="view-toggle" id="view-toggle">
        <button class="view-btn active" data-view="completa" id="btn-completa">
          <span class="vb-icon">⊞</span> Malla completa
        </button>
        <button class="view-btn" data-view="disponible" id="btn-disponible">
          <span class="vb-icon">✦</span> Disponible para mí
        </button>
      </div>
      <select id="carrera-select"></select>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="legend-bar" id="legend-bar">
    <span style="font-size:11px;font-weight:600;color:var(--muted)">Categorías:</span>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-matematicas-bg);border-color:var(--cat-matematicas-border)"></div>
      <span style="color:var(--cat-matematicas-text)">Matemáticas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-ciencias-bg);border-color:var(--cat-ciencias-border)"></div>
      <span style="color:var(--cat-ciencias-text)">Ciencias</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-programacion-bg);border-color:var(--cat-programacion-border)"></div>
      <span style="color:var(--cat-programacion-text)">Programación</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-sistemas-bg);border-color:var(--cat-sistemas-border)"></div>
      <span style="color:var(--cat-sistemas-text)">Sistemas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-electiva-bg);border-color:var(--cat-electiva-border)"></div>
      <span style="color:var(--cat-electiva-text)">Electiva</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-humanidades-bg);border-color:var(--cat-humanidades-border)"></div>
      <span style="color:var(--cat-humanidades-text)">Humanidades</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-idiomas-bg);border-color:var(--cat-idiomas-border)"></div>
      <span style="color:var(--cat-idiomas-text)">Idiomas</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--cat-grado-bg);border-color:var(--cat-grado-border)"></div>
      <span style="color:var(--cat-grado-text)">Grado/Comp.</span>
    </div>
    <span style="margin-left:10px;font-size:11px;font-weight:600;color:var(--muted)">Estados:</span>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-aprobada-bg);border-color:var(--estado-aprobada-border)"></div>
      <span style="color:var(--estado-aprobada-text);background:var(--estado-aprobada-bg);padding:1px 4px;border-radius:3px">Aprobada</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-reprobada-bg);border-color:var(--estado-reprobada-border)"></div>
      <span style="color:var(--estado-reprobada-text);background:var(--estado-reprobada-bg);padding:1px 4px;border-radius:3px">Reprobada</span>
    </div>
    <div class="leg">
      <div class="leg-dot" style="background:var(--estado-cursando-bg);border-color:var(--estado-cursando-border)"></div>
      <span style="color:var(--estado-cursando-text);background:var(--estado-cursando-bg);padding:1px 4px;border-radius:3px">Cursando</span>
    </div>
    <span style="margin-left:6px;font-size:10px;color:var(--muted)">| Click derecho para cambiar estado · Click para ver detalles</span>
  </div>

  <div class="canvas-wrapper">
    <div class="pensum-canvas" id="pensum-canvas">
      <svg class="arrows" id="arrows-svg"></svg>
    </div>
  </div>

  <div class="ctx-menu" id="ctx-menu" style="display:none">
    <div class="ctx-lbl">Cambiar estado</div>
    <div class="ctx-item" data-action="aprobada">
      <span class="ctx-dot" style="background:var(--estado-aprobada-bg);border:1.5px solid var(--estado-aprobada-border)"></span>Aprobada
    </div>
    <div class="ctx-item" data-action="reprobada">
      <span class="ctx-dot" style="background:var(--estado-reprobada-bg);border:1.5px solid var(--estado-reprobada-border)"></span>Reprobada / Vista
    </div>
    <div class="ctx-item" data-action="cursando">
      <span class="ctx-dot" style="background:var(--estado-cursando-bg);border:1.5px solid var(--estado-cursando-border)"></span>Cursando
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="reset">
      <span class="ctx-dot" style="background:#e5e7eb;border:1.5px solid #9ca3af"></span>Restablecer
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <span class="dp-close" id="dp-close">✕</span>
    <div class="dp-codigo" id="dp-codigo"></div>
    <div class="dp-nombre" id="dp-nombre"></div>
    <div id="dp-body"></div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
